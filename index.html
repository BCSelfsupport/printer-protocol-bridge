<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>CodeSync™</title>
    <meta name="description" content="CodeSync™ - Industrial Printer Control Software" />
    <!-- manifest is auto-generated by vite-plugin-pwa -->
    <meta name="author" content="BestCode" />
    <script>
      // Run before Vite's production bundle is discovered. Older CodeSync PWA
      // builds registered a service worker that can keep serving a stale app
      // shell after publish; this removes that worker/cache before React boots.
      (function() {
        try {
          var isElectronRuntime = navigator.userAgent.includes('Electron');
          if (isElectronRuntime) return;
          var host = location.hostname;
          var isLovableRuntime = host === 'lovableproject.com' || host.endsWith('.lovableproject.com') || host === 'lovableproject-dev.com' || host.endsWith('.lovableproject-dev.com') || host === 'lovable.app' || host.endsWith('.lovable.app') || host.indexOf('id-preview--') === 0 || host.indexOf('preview--') === 0;
          if (!isLovableRuntime) return;
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              registrations.forEach(function(registration) { registration.unregister(); });
            }).catch(function() {});
          }
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(key) { caches.delete(key); });
            }).catch(function() {});
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/codesync-icon.png?v=2" type="image/png" />
    <link rel="apple-touch-icon" href="/codesync-icon.png?v=2" />

    <meta property="og:title" content="CodeSync™" />
    <meta property="og:description" content="Industrial Printer Control Software" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:40px;font-family:sans-serif;color:#fff;background:#111;min-height:100vh">
        <h1>CodeSync™</h1>
        <p>JavaScript must be enabled to run this application.</p>
      </div>
    </noscript>
    <script>
      // HTML-level crash catcher – keep this conservative in preview and Electron to avoid false timeouts on cold loads
      window.__CS_MOUNTED = false;
      const isElectronRuntime = navigator.userAgent.includes('Electron');
      const isPreviewRuntime = location.hostname.includes('lovableproject.com') || location.hostname.includes('lovable.app');
      // Mobile devices on cellular can easily take 20-30s for a cold bundle load.
      // Give preview/mobile a much longer grace window before showing the crash screen.
      const isMobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      const startupTimeoutMs = isElectronRuntime ? 20000 : (isPreviewRuntime ? (isMobileUA ? 45000 : 20000) : (isMobileUA ? 30000 : 8000));
      setTimeout(function() {
        if (!window.__CS_MOUNTED) {
          var root = document.getElementById('root');
          if (root && root.children.length === 0) {
            root.innerHTML = '<div style="padding:40px;font-family:monospace;color:#ff6b6b;background:#111;min-height:100vh">' +
              '<h1 style="color:#fff">CodeSync™ – Startup Error</h1>' +
              '<p>The application failed to start. Open DevTools (Ctrl+Shift+I) to see errors.</p>' +
              '<p>Check the Console tab for details.</p>' +
              '<pre id="cs-error" style="background:#222;padding:16px;border-radius:8px;overflow:auto;max-height:400px;white-space:pre-wrap"></pre>' +
              '<p style="color:#9ca3af;margin-top:12px">Startup watchdog timeout after ' + Math.round(startupTimeoutMs / 1000) + 's. If this happens repeatedly, open DevTools for the full stack trace.</p>' +
              '</div>';
          }
        }
      }, startupTimeoutMs);
      window.addEventListener('error', function(e) {
        console.error('[global-error]', e.message, e.filename, e.lineno);
        var el = document.getElementById('cs-error');
        if (el) el.textContent += e.message + ' at ' + e.filename + ':' + e.lineno + '\n';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
