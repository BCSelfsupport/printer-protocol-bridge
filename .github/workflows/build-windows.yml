name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          $version = (node -p "require('./package.json').version")
          echo "NEW_VERSION=$version" >> $env:GITHUB_ENV
          git add package.json package-lock.json
          git commit -m "chore: bump version to $version"
          git push

      - name: Install dependencies
        run: npm install

      - name: Install Electron build tools
        run: |
          npm install --save-dev electron electron-builder
          npm install electron-updater

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          ELECTRON_BUILD: "1"
        run: npm run build

      - name: Prepare icon
        run: |
          if (!(Test-Path "electron\resources")) { New-Item -ItemType Directory -Path "electron\resources" }
          Copy-Item "public\codesync-icon.png" "electron\resources\icon.png" -Force

      - name: Build installer
        run: npx electron-builder --config electron/electron-builder.json --win --publish never

      - name: Publish installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = $env:NEW_VERSION
          if (-not $version) { $version = (node -p "require('./package.json').version") }
          $tag = "v$version"
          $target = (git rev-parse HEAD)

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $version
          } else {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --title $version --target $target --latest
          }

          $assets = Get-ChildItem -Path release -File | Where-Object {
            $_.Name -like "*.exe" -or $_.Name -like "*.blockmap" -or $_.Name -eq "latest.yml"
          }
          if (-not $assets) { throw "No installer assets found in release folder" }

          foreach ($asset in $assets) {
            gh release upload $tag $asset.FullName --repo $env:GITHUB_REPOSITORY --clobber
          }
